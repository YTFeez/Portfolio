# Déploie le site statique sur GitHub Pages (branche main ou master).
# Réglages dépôt : Settings → Pages → Build and deployment → Source : GitHub Actions
name: Déployer GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pages — configuration
        uses: actions/configure-pages@v5

      - name: Pages — artefact (HTML, CSS, JS à la racine du dépôt)
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Pages — publication
        id: deployment
        uses: actions/deploy-pages@v4
